name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          ndk-version: none

      - name: Install Cordova & plugins
        run: |
          npm install -g cordova
          cordova create app com.abusalah.ababeel "أبابيل غزة"
          cd app
          cordova platform add android
          cordova plugin add cordova-plugin-bluetooth-serial || true

      - name: Inject game files
        run: |
          rm -rf app/www/*
          cp -r www/* app/www/
          cp config.xml app/config.xml

      - name: Build APK
        run: |
          cd app
          cordova build android --no-telemetry

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ababeel-gaza-apk
          path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          compression-level: 0
