name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: 35.0.0
          ndk-version: none

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create project with custom config
        run: |
          cordova create app com.abusalah.ababeel "أبابيل غزة"
          rm -rf app/www/*
          cp -r www/* app/www/
          cp config.xml app/config.xml

      - name: Add Android platform & plugins
        run: |
          cd app
          cordova platform add android@13
          cordova plugin add cordova-plugin-bluetooth-serial || true

      - name: Build APK
        run: |
          cd app
          cordova build android --no-telemetry

      - name: Locate and Upload APK
        run: |
          find . -name "app-debug.apk" -type f 2>/dev/null | head -5

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ababeel-gaza-apk
          path: "**/app-debug.apk"
          if-no-files-found: error
          compression-level: 0
